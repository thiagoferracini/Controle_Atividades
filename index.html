<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Master Ailog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl overflow-hidden">
        <div class="bg-slate-800 p-6 text-white flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">Painel de Controle de Entregas</h1>
                <p class="text-slate-400 text-sm">Foco em ISO 9001 & Produtividade</p>
            </div>
            <div id="stats" class="text-right text-xs font-mono"></div>
        </div>

        <div class="p-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3 mb-8 bg-slate-50 p-5 rounded-lg border border-slate-200">
                <input type="text" id="taskInput" placeholder="Atividade..." class="md:col-span-2 p-2 border rounded">
                <input type="date" id="deadlineInput" class="p-2 border rounded">
                
                <select id="catInput" class="p-2 border rounded">
                    <option value="Ailog">🏢 Ailog / Qualidade</option>
                    <option value="ISO/LGPD">📜 ISO 9001 / LGPD</option>
                    <option value="Projetos">🚀 Projetos (Veloe/Alelo)</option>
                    <option value="Pessoal">🏠 Pessoal / Estácio</option>
                </select>

                <select id="prioInput" class="p-2 border rounded">
                    <option value="Baixa">🔵 Baixa</option>
                    <option value="Média" selected>🟡 Média</option>
                    <option value="Alta">🔴 Alta / Crítica</option>
                </select>

                <input type="text" id="linkInput" placeholder="Link/Obs (opcional)" class="p-2 border rounded">
                
                <button onclick="salvarTarefa()" id="btnSalvar" class="md:col-span-3 bg-slate-800 text-white font-bold py-3 rounded hover:bg-black transition">CADASTRAR ATIVIDADE</button>
            </div>

            <div class="flex flex-wrap gap-2 mb-6 border-b pb-4">
                <button onclick="renderizar('todos')" class="bg-slate-200 px-4 py-1 rounded-full text-sm">Todas</button>
                <button onclick="renderizar('atrasados')" class="bg-red-100 text-red-700 px-4 py-1 rounded-full text-sm font-bold">Atrasadas</button>
                <button onclick="renderizar('Alta')" class="bg-orange-100 text-orange-700 px-4 py-1 rounded-full text-sm font-bold text-orange-700">Prioridade Alta</button>
            </div>

            <div id="lista" class="space-y-3 text-sm">
                </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'Uhttps://script.google.com/macros/s/AKfycbxOvgM6b8j7zq72nim0sXD7iYkIjFhXpgfNdi2G_qQL_YAzsur8TYQ5q8pZ9SNDiFAh/exec';
        let tarefas = [];

        async function buscarDados() {
            const res = await fetch(`${SCRIPT_URL}?action=listar`);
            tarefas = await res.json();
            renderizar('todos');
        }

        async function salvarTarefa() {
            const btn = document.getElementById('btnSalvar');
            const data = {
                action: 'adicionar',
                atividade: document.getElementById('taskInput').value,
                prazo: document.getElementById('deadlineInput').value,
                categoria: document.getElementById('catInput').value,
                prioridade: document.getElementById('prioInput').value,
                link: document.getElementById('linkInput').value
            };

            if(!data.atividade || !data.prazo) return alert("Erro: Atividade e Prazo são obrigatórios.");

            btn.disabled = true; btn.innerText = "Gravando...";
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) });
            
            // Limpar e recarregar
            ['taskInput','deadlineInput','linkInput'].forEach(id => document.getElementById(id).value = "");
            btn.disabled = false; btn.innerText = "CADASTRAR ATIVIDADE";
            buscarDados();
        }

        async function concluir(id) {
            await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({action: 'concluir', id}) });
            buscarDados();
        }

        function renderizar(filtro) {
            const lista = document.getElementById('lista');
            lista.innerHTML = "";
            const hoje = new Date(); hoje.setHours(0,0,0,0);

            const filtradas = tarefas.filter(t => {
                const p = new Date(t.prazo); p.setDate(p.getDate() + 1);
                if (filtro === 'atrasados') return p < hoje && t.status !== 'Concluído';
                if (filtro === 'Alta') return t.prioridade === 'Alta' && t.status !== 'Concluído';
                if (filtro === 'todos') return true;
                return true;
            });

            filtradas.forEach(t => {
                const p = new Date(t.prazo); p.setDate(p.getDate() + 1);
                const isAtrasado = p < hoje && t.status !== 'Concluído';
                const corPrio = t.prioridade === 'Alta' ? 'border-l-4 border-l-red-500' : (t.prioridade === 'Média' ? 'border-l-4 border-l-yellow-400' : 'border-l-4 border-l-blue-400');

                lista.innerHTML += `
                    <div class="flex items-center justify-between p-4 border rounded-lg bg-white shadow-sm ${corPrio} ${t.status === 'Concluído' ? 'opacity-50' : ''}">
                        <div class="flex-1">
                            <div class="flex items-center gap-2">
                                <span class="text-[10px] uppercase font-bold px-2 py-0.5 bg-slate-100 rounded text-slate-600">${t.categoria}</span>
                                <h4 class="font-bold ${t.status === 'Concluído' ? 'line-through text-slate-400' : 'text-slate-800'}">${t.atividade}</h4>
                            </div>
                            <p class="text-[11px] text-slate-500 mt-1">
                                Prazo: ${p.toLocaleDateString()} 
                                ${isAtrasado ? `<span class="text-red-600 font-bold underline ml-2">ATRASADO</span>` : ''}
                                ${t.link ? ` | <a href="${t.link}" target="_blank" class="text-blue-500 underline">Ver Link</a>` : ''}
                            </p>
                        </div>
                        ${t.status !== 'Concluído' ? `<button onclick="concluir(${t.id})" class="bg-slate-800 text-white p-2 rounded hover:bg-emerald-600 transition">✓</button>` : '✅'}
                    </div>
                `;
            });
        }

        buscarDados();
    </script>
</body>
</html>
